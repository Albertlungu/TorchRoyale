name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Android platform-tools
        shell: pwsh
        run: |
          $sdkRoot = Join-Path $env:LOCALAPPDATA "Android\Sdk"
          $platformTools = Join-Path $sdkRoot "platform-tools"
          New-Item -ItemType Directory -Force -Path $sdkRoot | Out-Null
          Invoke-WebRequest `
            -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" `
            -OutFile "platform-tools.zip"
          Expand-Archive -Path "platform-tools.zip" -DestinationPath $sdkRoot -Force
          if (-not (Test-Path (Join-Path $platformTools "adb.exe"))) {
            throw "adb.exe not found after extracting platform-tools"
          }
          "ANDROID_SDK_ROOT=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create venv
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\python.exe -m pip install --upgrade pip
          .\venv\Scripts\pip.exe install -r requirements.txt
          .\venv\Scripts\pip.exe install pyinstaller

      - name: Build app
        shell: pwsh
        run: |
          .\scripts\build_windows_app.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TorchRoyale-windows
          path: dist/TorchRoyale
