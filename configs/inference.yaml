# Decision Transformer Inference Configuration

# Model checkpoint
checkpoint:
  path: "output/models/best.pt"  # Path to trained model checkpoint

# Inference parameters
inference:
  device: "cpu"  # Device: "cpu", "cuda", or "mps" (mps has numerical stability issues)
  target_return: 3.0  # Desired return-to-go for conditioning
  temperature: 3.0  # Sampling temperature (higher = more random)
                    # 0.0 = greedy/deterministic
                    # 1.0 = sample from model distribution
                    # 1.5-2.0 = more exploration
                    # 2.5+ = aggressive exploration (recommended to prevent collapse)

# Strategy parameters
strategy:
  fallback_tile_x: 9  # Default tile x-coordinate when no valid placement
  fallback_tile_y: 24  # Default tile y-coordinate when no valid placement
